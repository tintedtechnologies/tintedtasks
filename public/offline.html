<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f8a3a" />
    <title>Tinted Tasks Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #e3e5e3;
        color: #181c1a;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #e3e5e3;
      }

      main {
        width: min(32rem, 100%);
        padding: 24px;
        border: 1px solid rgba(24, 28, 26, 0.12);
        border-radius: 18px;
        background: #f1f2f1;
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.08);
      }

      p {
        line-height: 1.6;
        color: #626864;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #1f8a3a;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        line-height: 1.1;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Offline</p>
      <h1>Tinted Tasks is unavailable right now</h1>
      <p>
        The app shell is cached for offline reuse, but this view appears when the current page was not cached yet.
        Reconnect once, open Tinted Tasks again, and future offline launches will work more reliably.
      </p>
    </main>
  </body>
</html>
